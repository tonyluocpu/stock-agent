<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Agent - Frontend Test (OpenRouter)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .status {
            padding: 15px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
        }
        
        .status-indicator.connected {
            background: #28a745;
        }
        
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message-bubble {
            display: inline-block;
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        
        .message-bubble h2, .message-bubble h3 {
            margin-top: 16px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .message-bubble h2:first-child, .message-bubble h3:first-child {
            margin-top: 0;
        }
        
        .message-bubble ul, .message-bubble ol {
            margin: 8px 0;
            padding-left: 24px;
        }
        
        .message-bubble li {
            margin: 4px 0;
        }
        
        .message-bubble strong {
            font-weight: 600;
        }
        
        .message-bubble hr {
            border: none;
            border-top: 1px solid rgba(0,0,0,0.1);
            margin: 16px 0;
        }
        
        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .message.bot .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #e9ecef;
        }
        
        .message-type {
            font-size: 11px;
            color: #6c757d;
            margin-top: 5px;
            font-weight: 500;
        }
        
        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }
        
        .input-container input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .input-container input:focus {
            border-color: #667eea;
        }
        
        .input-container button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .input-container button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .input-container button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 Stock Agent Chat</h1>
            <p>Testing with OpenRouter API</p>
        </div>
        
        <div class="status">
            <div class="status-indicator" id="statusIndicator"></div>
            <span id="statusText">Checking connection...</span>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message bot">
                <div class="message-bubble">
                    👋 Hello! I'm your Stock Agent powered by OpenRouter. Try asking me:
                    <br><br>
                    • "Apple weekly data from 2020 to 2024"<br>
                    • "How is Tesla performing today?"<br>
                    • "Stock analysis of NVIDIA"
                </div>
            </div>
        </div>
        
        <div class="input-container">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Ask about stocks..."
                onkeypress="if(event.key === 'Enter') sendMessage()"
            >
            <button id="sendButton" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5001/api/chat';
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        
        let messages = [];
        let sessionId = null;
        let heartbeatInterval = null;
        
        // Start session and set up heartbeat
        async function startSession() {
            try {
                const response = await fetch('http://localhost:5001/api/session/start', {
                    method: 'POST'
                });
                const data = await response.json();
                if (data.success && data.session_id) {
                    sessionId = data.session_id;
                    console.log('Session started:', sessionId);
                    
                    // Start heartbeat (every 120 seconds)
                    heartbeatInterval = setInterval(async () => {
                        try {
                            await fetch('http://localhost:5001/api/heartbeat', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ session_id: sessionId })
                            });
                        } catch (error) {
                            console.error('Heartbeat failed:', error);
                        }
                    }, 120000); // 120 seconds
                    
                    // End session on page unload
                    window.addEventListener('beforeunload', async () => {
                        if (sessionId) {
                            try {
                                await fetch('http://localhost:5001/api/session/end', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ session_id: sessionId })
                                });
                            } catch (error) {
                                console.error('Failed to end session:', error);
                            }
                        }
                    });
                }
            } catch (error) {
                console.error('Failed to start session:', error);
            }
        }
        
        // Check API health on load with retry
        async function checkHealth(retries = 10, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch('http://localhost:5001/api/health');
                    if (response.ok) {
                        // Also check if service is initialized
                        const configResponse = await fetch('http://localhost:5001/api/config');
                        if (configResponse.ok) {
                            statusIndicator.classList.add('connected');
                            statusText.textContent = '✅ Connected to API server';
                            // Start session after health check
                            await startSession();
                            return true;
                        }
                    }
                } catch (error) {
                    // Server not ready yet
                    if (i < retries - 1) {
                        statusText.textContent = `⏳ Waiting for server... (${i + 1}/${retries})`;
                        await new Promise(resolve => setTimeout(resolve, delay));
                        continue;
                    }
                }
            }
            
            // If we get here, server didn't respond
            statusText.textContent = '❌ API server not running. Start it with: ./start_frontend.sh';
            statusIndicator.classList.remove('connected');
            return false;
        }
        
        checkHealth();
        
        function addMessage(text, isUser, type = null, isStatus = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            if (isStatus) {
                // Status messages have special styling
                bubble.style.fontStyle = 'italic';
                bubble.style.opacity = '0.8';
                bubble.style.borderLeft = '3px solid #667eea';
                bubble.style.paddingLeft = '15px';
                bubble.innerHTML = `<span style="color: #667eea;">⏳</span> ${text}`;
            } else {
                // Regular messages - support markdown-like formatting
                bubble.innerHTML = formatMessage(text);
            }
            
            messageDiv.appendChild(bubble);
            
            if (type && !isUser && !isStatus) {
                const typeDiv = document.createElement('div');
                typeDiv.className = 'message-type';
                typeDiv.textContent = `Type: ${type}`;
                messageDiv.appendChild(typeDiv);
            }
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function formatMessage(text) {
            // Simple markdown-like formatting
            let formatted = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
            return formatted;
        }
        
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = `Error: ${message}`;
            chatContainer.appendChild(errorDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage(message, true);
            messages.push({ role: 'user', content: message });
            messageInput.value = '';
            sendButton.disabled = true;
            sendButton.innerHTML = '<div class="loading"></div>';
            
            // Show initial "thinking" status
            let statusMessageId = null;
            const showStatus = (statusText) => {
                if (statusMessageId) {
                    // Update existing status
                    const existingStatus = document.getElementById(statusMessageId);
                    if (existingStatus) {
                        existingStatus.querySelector('.message-bubble').innerHTML = `<span style="color: #667eea;">⏳</span> ${statusText}`;
                        return;
                    }
                }
                // Create new status message
                const statusDiv = document.createElement('div');
                statusDiv.className = 'message bot';
                statusDiv.id = `status-${Date.now()}`;
                statusMessageId = statusDiv.id;
                
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                bubble.style.fontStyle = 'italic';
                bubble.style.opacity = '0.8';
                bubble.style.borderLeft = '3px solid #667eea';
                bubble.style.paddingLeft = '15px';
                bubble.innerHTML = `<span style="color: #667eea;">⏳</span> ${statusText}`;
                
                statusDiv.appendChild(bubble);
                chatContainer.appendChild(statusDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            };
            
            // Show initial status (will be replaced by API status if provided)
            // For screening, API will return instant status, so show minimal message
            const isScreening = message.toLowerCase().includes('screen') || message.toLowerCase().includes('screening') || message.toLowerCase().includes('sector');
            if (isScreening) {
                showStatus('🔍 Starting screening...');
            } else {
                showStatus('🤔 Processing your request...');
            }
            
            try {
                // Check if server is ready first
                try {
                    const healthCheck = await fetch('http://localhost:5001/api/health', { 
                        method: 'GET',
                        signal: AbortSignal.timeout(2000) // 2 second timeout
                    });
                    if (!healthCheck.ok) {
                        throw new Error('Server not ready');
                    }
                } catch (healthError) {
                    // Remove status message
                    if (statusMessageId) {
                        const statusEl = document.getElementById(statusMessageId);
                        if (statusEl) {
                            statusEl.remove();
                        }
                    }
                    showError('⚠️ Server is still starting up. Please wait a moment and try again. The model is loading...');
                    sendButton.disabled = false;
                    sendButton.textContent = 'Send';
                    return;
                }
                
                // For screening requests, use longer timeout (10 minutes)
                // Other requests use 5 minutes
                const isScreeningRequest = message.toLowerCase().includes('screen') || 
                                          message.toLowerCase().includes('screening') || 
                                          message.toLowerCase().includes('sector');
                const timeoutMs = isScreeningRequest ? 600000 : 300000; // 10 min for screening, 5 min for others
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        context: messages,
                        session_id: sessionId  // Include session ID for logging
                    }),
                    signal: AbortSignal.timeout(timeoutMs)
                });
                
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status} ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.success) {
                    // Update status message if provided (replace the initial one)
                    if (data.status) {
                        if (statusMessageId) {
                            const statusEl = document.getElementById(statusMessageId);
                            if (statusEl) {
                                statusEl.querySelector('.message-bubble').innerHTML = `<span style="color: #667eea;">⏳</span> ${data.status}`;
                            }
                        } else {
                            addMessage(data.status, false, null, true);
                        }
                        // Wait a moment before showing the actual response
                        await new Promise(resolve => setTimeout(resolve, 300));
                    }
                    
                    // Remove status message before showing response
                    if (statusMessageId) {
                        const statusEl = document.getElementById(statusMessageId);
                        if (statusEl) {
                            statusEl.remove();
                            statusMessageId = null;
                        }
                    }
                    
                    // Show actual response
                    addMessage(data.response, false, data.type);
                    messages.push({ role: 'assistant', content: data.response });
                } else {
                    // Better error messages
                    const errorMsg = data.error || data.response || 'Request failed';
                    showError(`❌ ${errorMsg}`);
                }
            } catch (error) {
                // Remove status message on error
                if (statusMessageId) {
                    const statusEl = document.getElementById(statusMessageId);
                    if (statusEl) {
                        statusEl.remove();
                    }
                }
                
                // Better error messages based on error type
                let errorMessage = 'Unknown error occurred';
                if (error.name === 'AbortError' || error.message.includes('timeout')) {
                    if (isScreeningRequest) {
                        errorMessage = '⏱️ Screening timed out (takes 2-7 minutes). The screening might still be running on the server. Please wait a moment and check the results, or try a smaller sector.';
                    } else {
                        errorMessage = '⏱️ Request timed out. The operation might be taking longer than expected. Try again or ask a simpler question.';
                    }
                } else if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    errorMessage = '🔌 Connection failed. Please check if the API server is running on port 5001.';
                } else if (error.message.includes('Server error')) {
                    errorMessage = `⚠️ Server error: ${error.message}`;
                } else {
                    errorMessage = `❌ ${error.message || 'An error occurred'}`;
                }
                
                showError(errorMessage);
                console.error('Error:', error);
            } finally {
                sendButton.disabled = false;
                sendButton.textContent = 'Send';
            }
        }
    </script>
</body>
</html>
